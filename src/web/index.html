        <script type = "text/javascript">
            function relation(message_char)
            {

                // Use Data From JSON
                let relations = [JSON];
                text = message_char.replace(message_char, relations[message_char]);
                return text;
            }

            function maskData(identifier)
            {
                /* 
                    Cifrate text written by the user when is changed on text entry
                    to better timing.

                    Get by parameter the text input ID
                 */
                // Select text written by the user
                let formData = document.getElementById(identifier);
                let content = formData.value;
                let cipher_list = [];
                // Only make encryption when get all the text
                if (content.length >= 8)
                {
                    // Iterates over each character in original text and key char that is very long for cipher all the data input
                    for (let index = 0; index < content.length; index++)
                    {
                        cipher_list.push(relation(content[index]));
                    }
                    // Now change value with cipher text
                    formData.value = cipher_list.join("");
                }    
            }
        </script>
